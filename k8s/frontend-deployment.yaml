# frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: interview
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: DOCKER_USER/frontend:{{IMAGE_TAG}}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: "http://backend:3000"
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 50
            periodSeconds: 10    
          readinessProbe:
            httpGet:
              path: /
              port: 80            
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80            
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---

# frontend-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: interview
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5173
      nodePort: 30080