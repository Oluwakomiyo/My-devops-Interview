name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Path to your backend Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/backend:${{ steps.vars.outputs.tag }} 

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/devops-interview # Path to your frontend Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/frontend:${{ steps.vars.outputs.tag }}      

  # JOB 2: Provision Infrastructure with Terraform
  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="resource_group_name=tf-state-rg" -backend-config="storage_account_name=tfstate" -backend-config="container_name=tfstate" -backend-config="key=prod.terraform.tfstate"
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

  # JOB 3: Deploy to Kubernetes
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} # JSON object or individual secrets

      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'my-devops-interview'
          cluster-name: 'my-aks-cluster'

      - name: Replace tokens in K8s manifests
        run: |
          sed -i "s/{{IMAGE_TAG}}/${{ needs.build-and-push.outputs.image_tag }}/g" k8s/deployment.yaml
          sed -i "s/DOCKER_USER/${{ secrets.DOCKER_HUB_USERNAME }}/g" k8s/deployment.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/